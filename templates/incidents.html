<!DOCTYPE html>
<html>
<head>
    <title>Incident List</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        h2 {
            margin-top: 20px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
            background-color: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }

        th {
            background-color: black;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            padding: 10px 20px;
            background-color: black;
            color: white;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h2>Cybersecurity Incident List</h2>

<table>
<tr>
    <th>ID</th>
    <th>Threat</th>
    <th>Vulnerability</th>
    <th>Risk</th>
    <th>Status</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
</tr>
{% endfor %}

</table>

<a href="/">⬅ Back to Home</a>

</body>
</html>
