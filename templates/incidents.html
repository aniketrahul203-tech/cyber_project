<!DOCTYPE html>
<html>
<head>
    <title>Cybersecurity Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background-color: #111827;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f3f4f6;
        }

        .high { color: red; font-weight: bold; }
        .medium { color: orange; }
        .low { color: green; }

        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

<h1>🔐 Cybersecurity Incident Dashboard</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Threat</th>
        <th>Vulnerability</th>
        <th>Risk</th>
        <th>Status</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>

        <td class="{% if row[3] >= 8 %}high{% elif row[3] >=5 %}medium{% else %}low{% endif %}">
            {{ row[3] }}
        </td>

        <td>{{ row[4] }}</td>
    </tr>
    {% endfor %}
</table>

<a href="/">
    <button class="btn">⬅ Back to Home</button>
</a>

</body>
</html>
